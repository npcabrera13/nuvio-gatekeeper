<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Admin</title>
    <link rel="stylesheet" href="style.css?v=11">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="https://i.ibb.co/J91qPG0/Logo-1080x1080.png">
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <img src="https://i.ibb.co/J91qPG0/Logo-1080x1080.png" alt="Nuvio" class="login-logo">
            <h1 class="login-title">Nuvio Admin</h1>
            <p class="login-subtitle">Manage customer accounts</p>
            <input type="password" id="password-input" class="form-input" placeholder="Admin password" autocomplete="current-password">
            <button id="login-btn" class="btn btn-primary btn-full">Unlock</button>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">

        <!-- Top Nav -->
        <nav class="topbar">
            <div class="topbar-left">
                <img src="https://i.ibb.co/J91qPG0/Logo-1080x1080.png" alt="Nuvio" class="topbar-logo">
                <span class="topbar-title">Nuvio Admin</span>
            </div>
            <div class="topbar-right">
                <button id="refresh-btn" class="btn btn-ghost btn-sm" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    <span class="btn-label">Refresh</span>
                </button>
                <button id="logout-btn" class="btn btn-ghost btn-sm" title="Log out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span class="btn-label">Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Actions Bar -->
            <div class="actions-bar">
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search by name, token, email, or customer...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="available">Available</button>
                    <button class="filter-btn" data-filter="assigned">Assigned</button>
                    <button class="filter-btn" data-filter="blocked">Blocked</button>
                </div>
                <div class="actions-right">
                    <button id="export-btn" class="btn btn-ghost btn-sm" title="Export CSV">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button id="bulk-btn" class="btn btn-ghost btn-sm" title="Bulk create">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        <span class="btn-label">Bulk</span>
                    </button>
                    <button id="create-btn" class="btn btn-primary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span>Create Token</span>
                    </button>
                </div>
            </div>

            <!-- Token Table -->
            <div class="table-container">
                <table class="token-table">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Token</th>
                            <th>Nuvio Email</th>
                            <th>Nuvio Password</th>
                            <th>Assigned To</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tokens-tbody">
                        <tr id="loading-row">
                            <td colspan="8" class="loading-cell">Loading tokens...</td>
                        </tr>
                    </tbody>
                </table>
                <div id="no-results" class="no-results hidden">
                    <p>No tokens found</p>
                </div>
            </div>

            <div class="table-footer">
                <span id="result-count" class="result-count">0 tokens</span>
            </div>

        </main>
    </div>

    <!-- Create Token Modal -->
    <div id="create-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-header">
                <h2>Create Token</h2>
                <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nuvio Email</label>
                    <input type="email" id="create-email" class="form-input" placeholder="user@nuvio.tv">
                </div>
                <div class="form-group">
                    <label>Nuvio Password</label>
                    <input type="text" id="create-password" class="form-input" placeholder="password123">
                </div>
                <div class="form-group">
                    <label>Customer Name (optional)</label>
                    <input type="text" id="create-name" class="form-input" placeholder="Juan Dela Cruz">
                </div>
                <div class="form-group">
                    <label>Days (optional, default 30)</label>
                    <input type="number" id="create-days" class="form-input" value="30" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
                <button id="create-submit" class="btn btn-primary">Create Token</button>
            </div>
        </div>
    </div>

    <!-- Bulk Create Modal -->
    <div id="bulk-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-header">
                <h2>Bulk Create Tokens</h2>
                <button class="modal-close" onclick="closeModal('bulk-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-hint">Paste one account per line: <code>email,password</code></p>
                <textarea id="bulk-text" class="form-textarea" placeholder="user1@nuvio.tv,pass123&#10;user2@nuvio.tv,pass456&#10;user3@nuvio.tv,pass789" rows="8"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('bulk-modal')">Cancel</button>
                <button id="bulk-submit" class="btn btn-primary">Create All</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-header">
                <h2>Edit Token</h2>
                <button class="modal-close" onclick="closeModal('edit-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Token ID</label>
                    <input type="text" id="edit-token" class="form-input" readonly>
                </div>
                <div class="form-group">
                    <label>Nuvio Email</label>
                    <input type="email" id="edit-email" class="form-input">
                </div>
                <div class="form-group">
                    <label>Nuvio Password</label>
                    <input type="text" id="edit-password" class="form-input">
                </div>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="edit-name" class="form-input">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="edit-notes" class="form-input">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('edit-modal')">Cancel</button>
                <button id="edit-submit" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Renew Modal -->
    <div id="renew-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-header">
                <h2>Renew Token</h2>
                <button class="modal-close" onclick="closeModal('renew-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="renew-id">
                <p class="modal-hint" id="renew-info"></p>
                <div class="renew-quick">
                    <button class="renew-btn" data-days="7">+7 days</button>
                    <button class="renew-btn" data-days="30">+30 days</button>
                    <button class="renew-btn" data-days="90">+90 days</button>
                </div>
                <div class="form-group">
                    <label>Or set exact days from now:</label>
                    <input type="number" id="renew-days" class="form-input" placeholder="30" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('renew-modal')">Cancel</button>
                <button id="renew-submit" class="btn btn-primary">Apply</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="admin.js?v=11"></script>
</body>
</html>
